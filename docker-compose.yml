volumes:
  qdrant_storage:
    driver: local
  opensearch_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  # neo4j_data:
  #   driver: local
  # neo4j_logs:
  #   driver: local
  # prometheus_data:
  #   driver: local
  # grafana_data:
