groups:
  - name: legal_review_alerts
    interval: 1m
    rules:
      - alert: HighRetrievalLatency
        expr: histogram_quantile(0.95, rate(hybrid_search_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Retrieval P95 latency exceeds 1s"
      
      - alert: HighRerankerLatency
        expr: histogram_quantile(0.95, rate(reranker_duration_seconds_bucket[5m])) > 0.3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Reranker P95 latency exceeds 300ms"
      
      - alert: HighEndToEndLatency
        expr: histogram_quantile(0.95, rate(review_pipeline_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "End-to-end review P95 latency exceeds 2s"
      
      - alert: GroqAPIErrors
        expr: rate(groq_api_errors_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Groq API error rate exceeds 5%"
      
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "HTTP error rate exceeds 1%"
